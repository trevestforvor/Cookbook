name: build-backend

# Builds the Cookbook KB FastAPI backend image and pushes it to GHCR so the
# Olares device can pull it. The build context is the repo root (the Dockerfile
# at deploy/Dockerfile COPYs src/, pyproject.toml, config.yaml and the seed DB);
# the root .dockerignore keeps the Swift app and the bulky data/ out of the context.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "pyproject.toml"
      - "config.yaml"
      - "deploy/Dockerfile"
      - "deploy/entrypoint.sh"
      - "deploy/seed/cookbook.sqlite"   # seed DB snapshot shipped in the image
      - ".github/workflows/build-backend.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to push (defaults to the short SHA + latest)"
        required: false
        default: ""

env:
  IMAGE: ghcr.io/trevestforvor/cookbook

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # required to push to GHCR
    steps:
      - uses: actions/checkout@v4

      - name: Compute tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          MANUAL="${{ github.event.inputs.tag }}"
          if [ -n "$MANUAL" ]; then
            echo "tags=${IMAGE}:${MANUAL},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${IMAGE}:sha-${SHORT_SHA},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .                       # repo root (see .dockerignore)
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # A `docker build` never RUNS the app, so a runtime crash (missing wheel lib,
      # uvicorn startup failure) ships a green build that crash-loops the pod (Olares
      # entrance then 421s). Actually start the container and curl /health so CI fails
      # loudly — and print container logs to surface the crash.
      - name: Smoke test — the image serves /health
        run: |
          set -e
          docker run -d --name cb -p 8000:8000 -e COOKBOOK_API_TOKEN="" "${IMAGE}:latest"
          ok=0
          for i in $(seq 1 40); do
            if curl -fsS http://localhost:8000/health; then echo; echo "SERVES /health OK"; ok=1; break; fi
            sleep 3
          done
          echo "----- container logs -----"; docker logs cb 2>&1 | tail -60
          docker rm -f cb >/dev/null 2>&1 || true
          [ "$ok" = 1 ] || { echo "::error::container never served /health"; exit 1; }

      - name: Reminder
        run: |
          echo "Pushed ${{ steps.tags.outputs.tags }}"
          echo "NOTE: the GHCR package must be set to Public for Olares nodes to pull it (one-time, in the package settings)."
