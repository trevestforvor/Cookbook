---
# Static, non-secret configuration. The user-supplied values (LITELLM_BASE_URL
# plus the secrets) are injected as env below from the Olares `envs:` fields,
# NOT stored here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cookbook-env
  namespace: "{{ .Release.Namespace }}"
data:
  COOKBOOK_API_HOST: "0.0.0.0"
  COOKBOOK_API_PORT: "8000"
  COOKBOOK_DB_PATH: "/app/data/db/cookbook.sqlite"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: cookbook
  name: cookbook
  namespace: "{{ .Release.Namespace }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: cookbook
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: cookbook
    spec:
      # Disable legacy docker-link env injection so namespace Service names
      # don't clobber the app's own config.
      enableServiceLinks: false
      containers:
        - name: cookbook
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: cookbook-env
          env:
            # User-supplied config. Olares injects whatever the user types into
            # the OlaresManifest `envs:` fields (editable in the app's install /
            # settings UI) as .Values.olaresEnv.<name>. The `default` keeps
            # helm lint/template resolving off-device and gives empty secrets a
            # safe value before the user fills them in.
            - name: LITELLM_BASE_URL
              value: "{{ index (.Values.olaresEnv | default dict) "LITELLM_BASE_URL" | default "https://litellm.trevestforvorolares.olares.com/v1" }}"
            - name: LITELLM_API_KEY
              value: "{{ index (.Values.olaresEnv | default dict) "LITELLM_API_KEY" | default "" }}"
            - name: BRAVE_API_KEY
              value: "{{ index (.Values.olaresEnv | default dict) "BRAVE_API_KEY" | default "" }}"
            - name: COOKBOOK_API_TOKEN
              value: "{{ index (.Values.olaresEnv | default dict) "COOKBOOK_API_TOKEN" | default "" }}"
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          volumeMounts:
            - mountPath: "/app/data"
              name: appdata
      volumes:
        # Persistent app data (SQLite DB + uploaded PDFs). Backed by the
        # per-app userspace appData dir so it survives restarts/upgrades.
        - name: appdata
          hostPath:
            path: "{{ .Values.userspace.appData }}/volumes/cookbook"
            type: DirectoryOrCreate
      restartPolicy: Always
status: {}
---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: cookbook
  name: cookbook
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "web"
      port: 8000
      targetPort: 8000
  selector:
    io.kompose.service: cookbook
status:
  loadBalancer: {}
