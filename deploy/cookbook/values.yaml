admin: ""
bfl:
  username: ""
userspace:
  appData: ""
  appCache: ""
  userData: ""
image:
  repository: "ghcr.io/trevestforvor/cookbook"
  # Pin to the immutable CI SHA tag (GHCR publishes sha-<commit> + latest, no
  # semver tags). sha-36c684e adds the delete/wipe endpoints (on top of the
  # config-ROOT crash fix). Bump this when CI publishes a newer image.
  tag: "sha-36c684e"
# Olares injects user-supplied env values (declared in OlaresManifest `envs:`)
# here at deploy time via .Values.olaresEnv.<envName>. The marketplace surfaces
# those as editable fields at install/settings time -- this is how the user
# provides LITELLM_BASE_URL + the secrets. Empty map keeps helm lint happy and
# never commits real keys.
olaresEnv: {}
