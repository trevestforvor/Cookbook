olaresManifest.version: '0.11.0'
olaresManifest.type: app
metadata:
  name: cookbook
  appid: cookbook
  title: Cookbook KB
  icon: https://crochet-market.crochetme.workers.dev/icons/cookbook.png
  description: Recipe knowledge base API -- ingest, search, and serve recipes
  version: 1.0.17
  versionName: '1.0.17'
  categories:
    - Productivity
entrances:
  - name: cookbook
    host: cookbook
    port: 8000
    title: Cookbook KB
    openMethod: window
    # public: the native iOS app calls this entrance directly. There is no
    # Olares SSO in front of it; an app-level bearer token (COOKBOOK_API_TOKEN)
    # that the FastAPI app validates protects every request instead.
    authLevel: public
spec:
  versionName: '1.0.17'
  upgradeDescription: |
    v1.0.17 -- no more frozen imports + auto-dedup (image sha-28cbbc7). A hung
    LLM call now times out in minutes (180s + 1 retry) instead of stranding an
    ingest worker for ~30 min, and zombie jobs left "running" by a restart are
    reconciled to an error on startup instead of sitting frozen in Activity
    forever. The library is also de-duplicated on startup: re-uploads that
    slipped past the file-skip (e.g. a frozen job that never recorded its hash)
    are hidden from the catalog non-destructively. No env or port changes.
    v1.0.16 -- bigger libraries + parallel imports (image sha-c796bfb). The
    catalog sync no longer caps at 1000 recipes: GET /recipes returns the WHOLE
    library, so the app stops freezing at 1000 "Recipes cached" once you pass 1k.
    Ingest workers raised 2 -> 8 to match the model's max-num-seqs, so parallel
    PDF imports each get a proxy slot instead of piling up and a couple of stuck
    jobs can't block the whole queue. No env or port changes.
    v1.0.15 -- Republish only. No app, image, or config changes; bumped to
    force a fresh marketplace install entry. Pinned image is unchanged
    (sha-ae61390).
    v1.0.14 -- PDF imports show up instantly (image sha-ae61390). A scanned
    cookbook now appears in the app's Activity inbox the moment you pick the
    file -- an "Uploading" row with live byte percent, then per-page progress --
    instead of nothing happening until the (large) upload finished. POST /ingest
    accepts an optional client job_id so the optimistic row keeps a stable id.
    Failed uploads now surface as an error row instead of staying stuck.
    No env or port changes.
    v1.0.13 -- scanned-cookbook ingestion gets smarter (image sha-b7fdd6a).
    Scanned PDF pages are now extracted with the vision model (VLM) instead of
    OCR-only, with live per-page stage progress streamed to the app as each page
    is processed. PDF import failures are now surfaced to the app (with stage
    labels) instead of failing silently. Builds on the v1.0.12 SSE streaming.
    No chart, env, or port changes.
    v1.0.12 -- the Assistant now streams (image sha-2c2bf78). A new
    POST /ask/stream endpoint emits the agent's progress as Server-Sent Events,
    so the app can show what the agent is doing (thinking / running a tool /
    answering) during the reasoning-model wait instead of a blank spinner. The
    agentic ReAct loops now use a dedicated thinking model (eagle, 8K budget)
    while guided-JSON extraction stays on the no-think model (eagle-nothink).
    This release also folds in the v1.0.11 change that was never published on its
    own: URL imports are idempotent -- re-adding the same URL REPLACES the
    existing recipe instead of creating a duplicate. Verified end-to-end against
    the live LLM. No chart, env, or port changes.
    v1.0.10 -- republish on the same image (sha-d2ff797), no code change. Bumps
    the version so the marketplace offers a fresh install entry after an
    uninstall. NOTE: uninstalling does NOT delete the app's data volume
    ({appData}/volumes/cookbook on the host), so a reinstall reuses the existing
    SQLite library. For a true reset, clear that path on the host, or use the
    in-app wipe / DELETE /recipes?confirm=true before reinstalling.
    v1.0.9 -- assistant add/edit hardening (image sha-d2ff797): adding a recipe
    now CONFIRMS first (URL: preview the parsed recipe -> you approve -> save;
    described: draft -> you approve -> save). URL imports are embedded + bump the
    catalog version (so they're searchable and the app re-syncs). Listings include
    recipe ids so "number 2" / follow-ups resolve, and a guard recovers when the
    model emits a tool call as text. Verified end-to-end against the live LLM.
    Image-side only -- no chart, env, or port changes.
    v1.0.8 -- assistant upgrade (image sha-f77ddf4). The Assistant gains
    conversational memory and can add, delete, and edit recipes in-chat: the
    agent loop persists turn history and re-syncs state after each /ask, so agent
    imports/deletes/edits show up in the app. New recipe-edit tools in the
    functions layer; /compose/save now delegates to a shared ingest path (DRY).
    CI also smoke-tests that the image serves /health, not just imports it.
    Image-side only -- no chart, env, or port changes.
    v1.0.7 -- crash-loop fix (image sha-15d8bb1). The prior v1.0.6 image
    crash-looped the pod on a clean install: `import cv2` (full opencv, pulled in
    by the OCR ingest path at uvicorn startup) needs GUI shared libs the slim
    runtime lacks, so the app died before serving and the entrance returned 421 /
    no healthy upstream. Switched to opencv-python-headless (the OCR code uses
    only image ops -- threshold/imread/cvtColor -- no GUI). CI now runs the image
    and imports the app, so a runtime-only crash fails the build instead of
    shipping a green image that crash-loops. Also: the seed database no longer
    ships stale ingest-job history. Recipe-builder and delete/wipe endpoints
    unchanged.
    v1.0.6 -- adds the conversational recipe builder (image sha-183238b):
    POST /recipes/compose (one synchronous turn -> a transient recipe DRAFT;
    generate from a description, parse a URL, or web-search find -- never writes)
    and POST /recipes/compose/save (persists the agreed draft). Pairs with the
    app's Assistant. Existing delete/wipe endpoints unchanged.
    v1.0.5 -- adds library-management endpoints (image sha-36c684e):
    DELETE /recipes/{id} (one recipe), DELETE /recipes?confirm=true (wipe the
    library to empty), and DELETE /ingest[/{job_id}] (clear import history).
    Lets the app delete recipes and start over for demos. All gated by the
    bearer token; recipe deletes bump the catalog version so the app re-syncs.
    v1.0.4 -- readiness-probe fix: the probe was GET / (the API 404s there), so
    the pod never went Ready and sat at 1/2 forever. Pointed it at /health
    (returns 200 {"ok":true}), matching the documented health contract. App was
    healthy all along; only the probe path was wrong.
    v1.0.3 -- repins the image to sha-7516e95, the first build with the
    config-ROOT fix (the FastAPI image crash-looped on import because config.py
    resolved its root to the python lib dir, not /app, so config.yaml was never
    found; the fix anchors COOKBOOK_ROOT=/app). Replaces the on-device symlink
    band-aid and also lands the data/ dirs on the persistent volume.
    v1.0.2 -- config fix: the secrets (LITELLM_API_KEY, BRAVE_API_KEY,
    COOKBOOK_API_TOKEN) and LITELLM_BASE_URL are now declared as Olares `envs:`
    fields, so they show up as editable inputs in the app's install / settings
    UI. v1.0.1 hardcoded REPLACE_ME placeholders that a marketplace install
    (which never runs `helm --set`) had no way to override, so the pod booted
    with junk secrets and rejected every request.
    v1.0.1 -- image-pull fix: values.yaml pinned the image to tag 1.0.0, which
    does not exist on GHCR (only sha-<commit> and latest are published), so the
    pod hit ImagePullBackOff. Repinned to the immutable CI tag sha-8106a68.
  fullDescription: |
    Cookbook KB is the backend for the native Cookbook app (iPhone, iPad, Mac).
    It is a self-hosted FastAPI service that ingests recipes (from PDFs, including
    scanned cookbooks via OCR, and from URLs), normalizes ingredients and
    nutrition, and serves a searchable recipe knowledge base over HTTP.

    - FastAPI HTTP API on port 8000.
    - PDF / scanned-cookbook ingestion (tesseract OCR + poppler + OpenCV).
    - URL recipe ingestion.
    - SQLite knowledge base persisted to the app's data volume, so ingested
      recipes and uploaded PDFs survive restarts and upgrades. Ships with a
      seed database so the API is useful immediately on first install.
    - LLM-assisted parsing via an OpenAI-compatible proxy (LiteLLM) over public
      HTTPS, plus optional web search (Brave).

    Authentication: this entrance is public (no Olares SSO) because the native
    app talks to it directly. Set COOKBOOK_API_TOKEN to a strong secret; the
    API requires that bearer token on every request.

    Configuration: set the secret values (LITELLM_API_KEY, BRAVE_API_KEY,
    COOKBOOK_API_TOKEN) before use. LITELLM_BASE_URL defaults to the LiteLLM
    proxy and can be overridden.
  developer: trevestforvor
  website: https://github.com/trevestforvor/weightloss
  sourceCode: https://github.com/trevestforvor/weightloss
  submitter: trevestforvor
  locale:
    - en-US
    - zh-CN
  license:
    - text: MIT
  category: Productivity
  requiredMemory: 1Gi
  limitedMemory: 2Gi
  requiredCpu: '1'
  limitedCpu: '2'
  requiredGpu: '0'
  limitedGpu: '0'
  requiredDisk: 2Gi
  limitedDisk: 10Gi
  supportArch:
    - amd64
permission:
  appData: true
middleware: {}
options:
  apiTimeout: 0
  dependencies:
    - type: system
      name: olares
      version: '>=1.12.3-0'
envs:
  - envName: COOKBOOK_API_TOKEN
    required: true
    type: password
    editable: true
    applyOnChange: true
    default: ""
    description: "Bearer token the API requires on every request (the public entrance's only protection). Mint with: openssl rand -hex 32. Enter the SAME value in the Cookbook app's Settings."
  - envName: LITELLM_API_KEY
    required: true
    type: password
    editable: true
    applyOnChange: true
    default: ""
    description: "API key for the LiteLLM / OpenAI-compatible gateway used for LLM-assisted recipe parsing (Bearer)."
  - envName: LITELLM_BASE_URL
    required: false
    type: string
    editable: true
    applyOnChange: true
    default: "https://litellm.trevestforvorolares.olares.com/v1"
    description: "OpenAI-compatible base URL for the LiteLLM gateway (public entrance + /v1). Override on a different Olares box."
  - envName: BRAVE_API_KEY
    required: false
    type: password
    editable: true
    applyOnChange: true
    default: ""
    description: "Optional Brave Search API key for web recipe ingestion. Leave blank to disable web search."
